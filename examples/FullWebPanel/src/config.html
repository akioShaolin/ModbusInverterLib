<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Configuração Modbus</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
            color: #222;
        }

        header {
            background: #0b3d5c;
            color: white;
            padding: 16px 20px;
        }

        header h1 {
            font-size: 22px;
            margin: 0 0 10px 0;
        }

        nav a {
            display: inline-block;
            color: white;
            text-decoration: none;
            background: #1565c0;
            padding: 8px 12px;
            border-radius: 8px;
            margin-right: 8px;
        }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px;
        }

        .status {
            background: #fff;
            border-left: 5px solid #1565c0;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, .08);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .12);
        }

        .card h2 {
            font-size: 17px;
            margin: 0 0 10px 0;
            color: #0b3d5c;
        }

        form {
            margin: 0 0 10px 0;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 9px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 15px;
            background: white;
        }

        button,
        .btn {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            border: 0;
            border-radius: 8px;
            background: #1565c0;
            color: white;
            padding: 10px 12px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .danger button {
            background: #b3261e;
        }

        .toggle button {
            background: #5b2da0;
        }

        .display {
            background: #eef3f7;
            border-radius: 8px;
            padding: 10px;
            min-height: 42px;
            line-height: 1.45;
            margin-top: 10px;
            font-size: 14px;
            overflow-wrap: anywhere;
        }

        .ok {
            border-left: 5px solid #16833a;
        }

        .fail {
            border-left: 5px solid #b3261e;
        }

        .small {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media(max-width:700px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
